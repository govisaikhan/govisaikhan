<!DOCTYPE html>
<html lang="mn" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title data-i18n="title_news">Мэдээ — Санал хүсэлт</title>
  <meta name="description" content="Мэдээ, санал хүсэлт — executive UI."/>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/3281/3281289.png">
</head>
<body class="bg-gray-50 text-gray-800" style="font-family: 'Manrope', system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial;">
  <header class="sticky top-0 z-30 header-colored">
    <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
      <a href="./" class="font-extrabold text-white text-base tracking-tight">М.ГОВЬСАЙХАН</a>
      <nav class="desktop-nav flex items-center gap-4">
        <a class="nav text-sm" href="./" data-i18n="nav_home">НҮҮР</a>
        <a class="nav text-sm" href="./projects.html" data-i18n="nav_projects">ТӨСӨЛ</a>
        <a class="nav text-sm" href="./sbd-man.html">СБД МАН</a>
        <a class="nav text-sm" href="./nosk.html">НОСК ХК</a>
        <a class="nav text-sm" href="./reels.html">ВИДЕО</a>
        <a class="btn-outline text-sm" href="#tFb" data-i18n="nav_book">👍🏻САНАЛ ӨГӨХ</a>
      </nav>
      <div class="flex items-center gap-2">
        <button id="langToggle" class="icon-btn">MN</button>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
        </button>
        <button id="hamburger" class="icon-btn" aria-label="Цэс"></button>
      </div>
    </div>
    <div id="mobileMenu">
      <a class="mob-nav" href="./">НҮҮР</a>
      <a class="mob-nav" href="./projects.html">ТӨСӨЛ</a>
      <a class="mob-nav active" href="./news.html">МЭДЭЭ</a>
      <a class="mob-nav" href="./sbd-man.html">СБД МАН</a>
      <a class="mob-nav" href="./nosk.html">НОСК ХК</a>
      <a class="mob-nav" href="./reels.html">ВИДЕО</a>
      <a class="mob-cta" href="#tFb">👍🏻 САНАЛ ӨГӨХ</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 pb-16 space-y-10">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="tNews" data-i18n="tab_news">Мэдээ</button>
      <button class="tab" data-tab="tFb" data-i18n="tab_feedback">Санал</button>
    </div>

    <!-- tNews -->
    <section id="tNews" class="tab-pane space-y-6">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <h1 class="text-3xl md:text-4xl font-extrabold" data-i18n="news_title">Мэдээ мэдээлэл</h1>
          <p class="text-gray-600" data-i18n="news_desc">Мэдээлэл татаж байна.</p>
        </div>
        <!-- ЗАСВАРЛАГДСАН: Хайлтын хэсэг responsive болсон -->
        <div class="flex flex-col sm:flex-row gap-3">
          <input id="q" type="search" class="input w-full sm:w-64" data-i18n-ph="search" placeholder="Хайлт...">
          <select id="cat" class="input w-full sm:w-auto">
            <option value="" data-i18n="all">Бүгд</option>
          </select>
        </div>
      </div>

      <div id="newsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <div id="newsGrid_nav" class="items-center justify-center gap-4 mt-8" style="display:none">
        <button id="newsGrid_prev" class="btn-soft px-5 py-2">← Өмнөх</button>
        <span id="newsGrid_info" class="text-sm font-bold text-gray-500"></span>
        <button id="newsGrid_next" class="btn-soft px-5 py-2">Дараах →</button>
      </div>
      <div id="newsEmpty" class="hidden text-gray-500" data-i18n="no_results">Илэрц олдсонгүй.</div>
    </section>

    <!-- tFb -->
    <section id="tFb" class="tab-pane hidden space-y-5">
      <h2 class="section-title">💬 Санал, сэтгэгдэл</h2>
      <p class="text-gray-600" data-i18n="feedback_desc">Та саналаа үлдээнэ үү. Бид таны саналыг анхааралтай хүлээн авч, шийдвэрлэх болно.</p>
      
      <form id="feedbackForm" class="card form-grid">
        <input name="name" class="input" data-i18n-ph="name_opt_ph" placeholder="Нэр" required>
        <input name="phone" class="input" data-i18n-ph="phone_opt_ph" placeholder="Утас" required>
        <input type="email" name="email" class="input" data-i18n-ph="email_opt_ph" placeholder="И-мэйл">
        
        <div class="flex items-center gap-2 md:col-span-2">
          <label class="text-gray-600" data-i18n="rating">Үнэлгээ:</label>
          <div class="flex gap-1" id="stars">
            <button type="button" data-v="1" class="star" title="1 од">★</button>
            <button type="button" data-v="2" class="star" title="2 од">★</button>
            <button type="button" data-v="3" class="star" title="3 од">★</button>
            <button type="button" data-v="4" class="star" title="4 од">★</button>
            <button type="button" data-v="5" class="star" title="5 од">★</button>
          </div>
          <input type="hidden" name="rating" value="5">
        </div>
        
        <textarea name="message" rows="3" class="md:col-span-2 input" data-i18n-ph="fb_ph" placeholder="Таны санал..." required></textarea>
        
        <div class="md:col-span-2 flex flex-col sm:flex-row items-start sm:items-center gap-3">
          <button id="fbBtn" class="btn-primary" type="submit" data-i18n="send">Илгээх</button>
          <span id="fbMsg" class="text-sm"></span>
        </div>
        
        <div class="md:col-span-2 text-xs text-gray-500 mt-2">
          <!-- <p>Тэмдэглэл: Хэрэв санал илгээхэд алдаа гарвал <code>API_BASE</code> URL-ээ Google Apps Script Web App URL-ээр солино уу.</p> -->
        </div>
      </form>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
